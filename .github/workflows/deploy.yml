name: Deploy to GitHub Pages

# Build the Vite site and publish it to GitHub Pages on every push to main.
on:
  push:
    branches: [main]
  workflow_dispatch: # lets you trigger it manually from the Actions tab

# Permissions the GitHub Pages deploy action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; a newer push cancels an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Enables the Pages site via the API if it isn't already, so the
      # deploy step can't 404 on a missing site.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # Vite outputs the production site here

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
